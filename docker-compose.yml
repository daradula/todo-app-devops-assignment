version: '3.8'

services:
 
  web:
    # Build configuration
    build:
      context: .
      dockerfile: Dockerfile
    
    # Container name
    container_name: todo-app
    
    # Port mapping (host:container)
    ports:
      - "8080:80"
    
    # Environment variables
    environment:
      - NODE_ENV=production
      - APP_VERSION=1.0.0
      - TZ=Asia/Colombo
    
    # Custom network
    networks:
      - app-network
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    # Labels for organization
    labels:
      - "com.todo-app.description=Todo List Application"
      - "com.todo-app.version=1.0.0"

# Networks Configuration

networks:
  app-network:
    driver: bridge
    name: todo-network

# Volumes Configuration (for future use)


volumes:
  app-data:
    driver: local
    name: todo-data